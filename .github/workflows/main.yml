name: CI

on:
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install modules
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test-verbose
